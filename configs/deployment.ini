# Shared deployment configuration notes (WP17)
# Runtime values are loaded from deployment/env/*.env

[services]
api_module = applications.api.app:app
admin_module = applications.web_admin.app:app
portal_module = applications.customer_portal.app:app

[ports]
api = 8000
admin = 8080
portal = 8081

[paths]
data_dir = applications/data
license_path = applications/data/licenses.json
report_path = reports
logs_dir = logs
knowledge_dir = knowledge

[environment]
BTE_API_BASE_URL = http://127.0.0.1:8000
BTE_STORAGE_BACKEND = json
BTE_LICENSE_PATH = applications/data/licenses.json
BTE_REPORT_PATH = reports
BTE_LOG_LEVEL = INFO
HOST = 127.0.0.1
PORT = 8000
