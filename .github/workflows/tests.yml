name: Tests

on:
  push:
    paths:
      - "engines/**"
      - "applications/**"
      - "tests/**"
      - "tools/**"
      - "requirements.txt"
      - "applications/requirements.txt"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "engines/**"
      - "applications/**"
      - "tests/**"
      - "tools/**"
      - "requirements.txt"
      - "applications/requirements.txt"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    name: Pytest matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r applications/requirements.txt

      - name: Applications tests
        run: python tools/run_tests.py --suite applications

      - name: Tools / infra checks
        run: python tools/run_tests.py --suite infra
