name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g. 1.0.1) without leading v"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release package
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r applications/requirements.txt
          pip install ruff==0.9.10

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Lint + tests
        run: |
          python tools/lint.py
          python tools/run_tests.py --ci

      - name: Build release
        run: python tools/build_release.py --version "${{ steps.ver.outputs.version }}"

      - name: Package release
        run: python tools/package_release.py --version "${{ steps.ver.outputs.version }}" --out dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bte-release-${{ steps.ver.outputs.version }}
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
