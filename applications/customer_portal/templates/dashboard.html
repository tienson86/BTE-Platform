<div class="dash">
  <header class="dash-hero">
    <div>
      <h1 data-i18n="dashboard.title"></h1>
      <p class="muted" id="dashGreeting" data-i18n="dashboard.welcome"></p>
    </div>
    <div class="dash-hero-meta" id="dashHeroMeta">
      <span class="bte-badge bte-badge-muted skeleton-badge" data-i18n="common.loading"></span>
    </div>
  </header>

  <section class="dash-section" data-i18n-aria-label="dashboard.quick_actions">
    <h2 data-i18n="dashboard.quick_actions"></h2>
    <div class="dash-actions">
      <a class="bte-card dash-action" href="/analyze">
        <div class="dash-action-label" data-i18n="dashboard.analyze_new"></div>
        <div class="dash-action-hint" data-i18n="dashboard.analyze_new_hint"></div>
      </a>
      <a class="bte-card dash-action" href="/reports">
        <div class="dash-action-label" data-i18n="dashboard.reports"></div>
        <div class="dash-action-hint" data-i18n="dashboard.reports_hint"></div>
      </a>
      <a class="bte-card dash-action" href="/history">
        <div class="dash-action-label" data-i18n="dashboard.history"></div>
        <div class="dash-action-hint" data-i18n="dashboard.history_hint"></div>
      </a>
      <a class="bte-card dash-action" href="/profile">
        <div class="dash-action-label" data-i18n="dashboard.profile"></div>
        <div class="dash-action-hint" data-i18n="dashboard.profile_hint"></div>
      </a>
    </div>
  </section>

  <section class="dash-section" data-i18n-aria-label="dashboard.recent_charts">
    <div class="dash-section-head">
      <h2 data-i18n="dashboard.recent_charts"></h2>
      <a class="muted" href="/history" data-i18n="common.view_all"></a>
    </div>
    <div id="dashRecent" class="dash-recent">
      <div class="bte-card skeleton-card"></div>
      <div class="bte-card skeleton-card"></div>
      <div class="bte-card skeleton-card"></div>
    </div>
  </section>

  <section class="dash-section" data-i18n-aria-label="dashboard.statistics">
    <h2 data-i18n="dashboard.statistics"></h2>
    <div id="dashStats" class="dash-stat-grid">
      <article class="bte-card skeleton-card"></article>
      <article class="bte-card skeleton-card"></article>
      <article class="bte-card skeleton-card"></article>
      <article class="bte-card skeleton-card"></article>
    </div>
  </section>

  <div class="dash-split">
    <section class="dash-section" data-i18n-aria-label="dashboard.system_status">
      <h2 data-i18n="dashboard.system_status"></h2>
      <div id="dashSystem" class="bte-card dash-status-card">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </section>

    <section class="dash-section" data-i18n-aria-label="dashboard.product_info">
      <h2 data-i18n="dashboard.product_info"></h2>
      <div id="dashProduct" class="bte-card dash-product-card">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </section>
  </div>
</div>
<script src="/static/js/dashboard.js"></script>
