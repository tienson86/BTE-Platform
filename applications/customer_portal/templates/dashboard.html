<div class="dash">
  <header class="dash-hero">
    <div>
      <h1>Dashboard</h1>
      <p class="muted" id="dashGreeting">Welcome to BTE Customer Portal</p>
    </div>
    <div class="dash-hero-meta" id="dashHeroMeta">
      <span class="bte-badge bte-badge-muted skeleton-badge">Loading</span>
    </div>
  </header>

  <section class="dash-section" aria-label="Quick Actions">
    <h2>Quick Actions</h2>
    <div class="dash-actions">
      <a class="bte-card dash-action" href="/analyze">
        <div class="dash-action-label">Analyze New Chart</div>
        <div class="dash-action-hint">Run full BTE pipeline</div>
      </a>
      <a class="bte-card dash-action" href="/reports">
        <div class="dash-action-label">Reports</div>
        <div class="dash-action-hint">Open report viewer</div>
      </a>
      <a class="bte-card dash-action" href="/history">
        <div class="dash-action-label">History</div>
        <div class="dash-action-hint">Recent local charts</div>
      </a>
      <a class="bte-card dash-action" href="/profile">
        <div class="dash-action-label">Profile</div>
        <div class="dash-action-hint">Account &amp; session</div>
      </a>
    </div>
  </section>

  <section class="dash-section" aria-label="Recent Charts">
    <div class="dash-section-head">
      <h2>Recent Charts</h2>
      <a class="muted" href="/history">View all</a>
    </div>
    <div id="dashRecent" class="dash-recent">
      <div class="bte-card skeleton-card"></div>
      <div class="bte-card skeleton-card"></div>
      <div class="bte-card skeleton-card"></div>
    </div>
  </section>

  <section class="dash-section" aria-label="Statistics">
    <h2>Statistics</h2>
    <div id="dashStats" class="dash-stat-grid">
      <article class="bte-card skeleton-card"></article>
      <article class="bte-card skeleton-card"></article>
      <article class="bte-card skeleton-card"></article>
      <article class="bte-card skeleton-card"></article>
    </div>
  </section>

  <div class="dash-split">
    <section class="dash-section" aria-label="System Status">
      <h2>System Status</h2>
      <div id="dashSystem" class="bte-card dash-status-card">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </section>

    <section class="dash-section" aria-label="Product Information">
      <h2>Product Information</h2>
      <div id="dashProduct" class="bte-card dash-product-card">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    </section>
  </div>
</div>
<script src="/static/js/dashboard.js"></script>
