<div class="panel">
  <h1>Sign in</h1>
  <p class="muted">Use your BTE account (JWT). Demo: <code>customer / customer123</code></p>
  <form id="loginForm" class="form-grid" style="max-width:420px">
    <label class="full">Username<input id="username" value="customer" required /></label>
    <label class="full">Password<input id="password" type="password" value="customer123" required /></label>
    <div class="full toolbar">
      <button type="submit">Login</button>
      <button type="button" class="secondary" id="btnLogout">Logout</button>
      <a class="btn secondary" href="/dashboard" style="display:inline-flex;align-items:center">Continue as guest</a>
    </div>
  </form>
  <p class="muted" id="loginStatus"></p>
</div>
<script src="/static/js/login.js"></script>
