<div class="panel reports-center">
  <header class="reports-hero">
    <div>
      <h1 data-i18n="reports.title"></h1>
      <p class="muted" data-i18n="reports.subtitle"></p>
    </div>
    <div class="reports-hero-actions no-print">
      <a class="btn secondary" href="/analyze" data-i18n="common.new_analyze"></a>
      <a class="btn secondary" href="/history" data-i18n="nav.history"></a>
    </div>
  </header>

  <div class="reports-toolbar no-print">
    <input id="reportSearch" type="search" data-i18n-placeholder="reports.search_placeholder" data-i18n-aria-label="reports.search_aria" />
    <select id="reportFilter" data-i18n-aria-label="reports.filter_aria">
      <option value="all" data-i18n="reports.all_types"></option>
      <option value="narrative" data-i18n="reports.type_narrative"></option>
      <option value="report" data-i18n="reports.type_report"></option>
      <option value="html" data-i18n="common.html"></option>
      <option value="markdown" data-i18n="common.markdown"></option>
      <option value="pdf" data-i18n="common.pdf"></option>
    </select>
    <select id="reportSort" data-i18n-aria-label="reports.sort_aria">
      <option value="date_desc" data-i18n="reports.newest_first"></option>
      <option value="date_asc" data-i18n="reports.oldest_first"></option>
      <option value="name_asc" data-i18n="reports.name_asc"></option>
      <option value="name_desc" data-i18n="reports.name_desc"></option>
    </select>
  </div>

  <div class="reports-layout">
    <section class="reports-list-pane" data-i18n-aria-label="reports.list_aria">
      <div class="reports-list-head">
        <h2 data-i18n="reports.list_heading"></h2>
        <span class="muted" id="reportCount" data-i18n="common.loading"></span>
      </div>
      <div id="reportList" class="reports-list">
        <div class="bte-card skeleton-card"></div>
        <div class="bte-card skeleton-card"></div>
        <div class="bte-card skeleton-card"></div>
      </div>
      <div class="reports-table-wrap no-print">
        <table class="reports-table" data-i18n-aria-label="reports.table_aria">
          <thead>
            <tr>
              <th data-i18n="common.name"></th>
              <th data-i18n="common.created"></th>
              <th data-i18n="common.type"></th>
              <th data-i18n="common.status"></th>
            </tr>
          </thead>
          <tbody id="reportTableBody">
            <tr><td colspan="4"><div class="skeleton-line"></div></td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="reports-preview-pane" data-i18n-aria-label="reports.preview_aria">
      <div class="reports-preview-head">
        <h2 id="previewTitle" data-i18n="common.preview"></h2>
        <div class="reports-preview-actions no-print" id="previewActions" hidden>
          <button type="button" class="secondary" data-action="open" data-i18n="common.open"></button>
          <button type="button" class="secondary" data-action="print" data-i18n="common.print"></button>
          <button type="button" class="secondary" data-action="copy" data-i18n="common.copy"></button>
          <button type="button" class="secondary" data-action="download" data-i18n="common.download"></button>
          <button type="button" class="secondary" data-action="share" data-i18n="common.share" data-i18n-title="common.coming_soon"></button>
        </div>
      </div>
      <div class="reports-format-tabs no-print" id="formatTabs" hidden>
        <button type="button" class="tab active" data-format="html" data-i18n="common.html"></button>
        <button type="button" class="tab" data-format="markdown" data-i18n="common.markdown"></button>
        <button type="button" class="tab" data-format="pdf" id="tabPdf" disabled data-i18n="common.pdf"></button>
      </div>
      <div id="previewEmpty" class="reports-empty bte-card" data-i18n="reports.empty"></div>
      <iframe id="previewHtml" class="reports-preview-frame" data-i18n-title="reports.preview_iframe" hidden></iframe>
      <pre id="previewMd" class="reports-preview-md pre" hidden></pre>
      <div id="previewPdf" class="reports-empty bte-card" hidden data-i18n="reports.pdf_unavailable"></div>
    </section>
  </div>
</div>
<script src="/static/js/reports.js"></script>
